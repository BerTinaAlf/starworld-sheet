<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 120" aria-hidden="true">
  <defs>
    <filter id="glow" x="-18%" y="-70%" width="136%" height="240%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.05" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9aa3ad" stop-opacity="0.78"/>
      <stop offset="0.22" stop-color="#f8fbff"/>
      <stop offset="0.5" stop-color="#777f8b"/>
      <stop offset="0.78" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#9aa3ad" stop-opacity="0.78"/>
    </linearGradient>

    <path id="star4" d="M0 -8 L1.8 -1.8 L8 0 L1.8 1.8 L0 8 L-1.8 1.8 L-8 0 L-1.8 -1.8 Z"/>
  </defs>

  <g fill="none" stroke-linecap="round" filter="url(#glow)">
