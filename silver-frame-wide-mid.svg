    <path d="M0 25 H180" stroke="#f6fbff" stroke-width="0.85" opacity="0.42"/>
    <path d="M0 95 H180" stroke="#f6fbff" stroke-width="0.85" opacity="0.42"/>
    <path d="M42 16 H112" stroke="#ffffff" stroke-width="1.6" opacity="0.42"/>
    <path d="M68 104 H146" stroke="#ffffff" stroke-width="1.6" opacity="0.42"/>
  </g>

  <g fill="#ffffff" filter="url(#glow)" opacity="0.88">
