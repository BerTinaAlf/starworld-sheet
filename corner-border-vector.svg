<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Celestial corner border">
  <defs>
    <style>
      .gold-fill {
        fill: #ead9b8;
      }

      .gold-line {
        fill: none;
        stroke: #ead9b8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .fine { stroke-width: 1.15; opacity: 0.82; }
      .mid { stroke-width: 2.4; }
      .bold { stroke-width: 4.2; }
      .soft { opacity: 0.38; }
    </style>

    <path id="smallSpark" d="M0 -18 L4 -4 L18 0 L4 4 L0 18 L-4 4 L-18 0 L-4 -4 Z"/>
    <path id="tinySpark" d="M0 -10 L2.5 -2.5 L10 0 L2.5 2.5 L0 10 L-2.5 2.5 L-10 0 L-2.5 -2.5 Z"/>
    <path id="rayBurst" d="M0 -50 L5 -8 L40 -36 L10 -6 L52 0 L10 6 L40 36 L5 8 L0 50 L-5 8 L-40 36 L-10 6 L-52 0 L-10 -6 L-40 -36 L-5 -8 Z"/>
  </defs>

  <g transform="translate(0 4)">
    <!-- tapered long border strokes -->
    <path class="gold-fill" d="M8 317 L285 314.8 L285 319.2 Z"/>
    <path class="gold-fill" d="M341 154 L343.1 207 L338.9 207 Z"/>
    <path class="gold-line fine soft" d="M10 321 H284"/>
    <path class="gold-line fine soft" style="stroke-width: 0.75" d="M341 156 V207"/>

    <!-- horizontal beads and small ornaments -->
    <circle class="gold-fill" cx="214" cy="317" r="4.4"/>
    <circle class="gold-line mid" cx="235" cy="317" r="10.5"/>
    <circle class="gold-fill" cx="235" cy="317" r="3.4"/>
    <circle class="gold-line fine" cx="235" cy="317" r="15"/>
    <use href="#tinySpark" class="gold-fill" transform="translate(260 317) scale(0.56)"/>
    <use href="#smallSpark" class="gold-fill" transform="translate(287 317) scale(0.62)"/>

    <!-- vertical beads and small ornaments -->
    <circle class="gold-fill" cx="341" cy="216" r="4.4"/>
    <circle class="gold-line mid" cx="341" cy="238" r="10.5"/>
    <circle class="gold-fill" cx="341" cy="238" r="3.4"/>
    <circle class="gold-line fine" cx="341" cy="238" r="15"/>
    <use href="#tinySpark" class="gold-fill" transform="translate(341 263) scale(0.56)"/>
    <use href="#smallSpark" class="gold-fill" transform="translate(341 290) scale(0.62)"/>

    <!-- corner sunburst -->
    <use href="#rayBurst" class="gold-fill" transform="translate(341 317) scale(0.86)"/>
    <g class="gold-line fine soft" transform="translate(341 317)">
      <path d="M0 -74 V-28"/>
      <path d="M0 28 V74"/>
      <path d="M-74 0 H-28"/>
      <path d="M28 0 H74"/>
      <path d="M-52 -52 L-20 -20"/>
      <path d="M52 -52 L20 -20"/>
      <path d="M-52 52 L-20 20"/>
      <path d="M52 52 L20 20"/>
      <path d="M-23 -67 L-9 -26"/>
      <path d="M23 -67 L9 -26"/>
      <path d="M-67 -23 L-26 -9"/>
      <path d="M-67 23 L-26 9"/>
      <path d="M67 -23 L26 -9"/>
      <path d="M67 23 L26 9"/>
    </g>
    <circle class="gold-line bold" cx="341" cy="317" r="17"/>
    <circle class="gold-line fine" cx="341" cy="317" r="25"/>
    <circle class="gold-fill" cx="341" cy="317" r="6.5"/>
  </g>
</svg>
